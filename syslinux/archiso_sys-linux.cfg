LABEL aero
TEXT HELP
Boot Aero Linux live environment on BIOS.
Installs the Aero Linux desktop system.
ENDTEXT
MENU LABEL Aero Linux (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID%

LABEL aero-speech
TEXT HELP
Boot Aero Linux live environment with speech feedback.
ENDTEXT
MENU LABEL Aero Linux (%ARCH%, BIOS) with ^speech
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% accessibility=on
