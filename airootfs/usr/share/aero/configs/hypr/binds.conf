# Aero Linux - Keybindings
# See https://wiki.hypr.land/Configuring/Binds

$mainMod = SUPER

# General bindings
bindd = $mainMod, RETURN, Terminal, exec, ghostty
bindd = $mainMod, F, File manager, exec, nautilus
bindd = $mainMod, B, Browser, exec, firefox
bindd = $mainMod, space, Launcher, exec, walker
bindd = $mainMod, Q, Close window, killactive
bindd = $mainMod, L, Lock session, exec, hyprlock
bindd = $mainMod, T, Task manager, exec, ghostty -e btop

# Screenshots
bindd = $mainMod, P, Screenshot area, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bindd = $mainMod SHIFT, P, Screenshot full, exec, grim ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png

# Workspace switching
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Window management
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Toggle floating / fullscreen
bindd = $mainMod, V, Toggle floating, togglefloating
bindd = $mainMod, F11, Fullscreen, fullscreen, 1
bindd = $mainMod SHIFT, F11, Fullscreen (fill), fullscreen, 0

# Scratchpad
bindd = $mainMod, S, Scratchpad, togglespecialworkspace
bindd = $mainMod SHIFT, S, Move to scratchpad, movetoworkspace, special

# Exit / power menu
bindd = $mainMod, Escape, Log out, exit
bindd = $mainMod SHIFT, Escape, Power menu, exec, wlogout

# Reload config
bindd = $mainMod, R, Reload config, exec, hyprctl reload
