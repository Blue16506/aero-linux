# Aero Linux - Input configuration
# See https://wiki.hypr.land/Configuring/Variables

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
    }

    sensitivity = 0
    accel_profile = flat
}
