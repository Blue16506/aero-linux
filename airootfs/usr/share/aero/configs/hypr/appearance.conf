# Aero Linux - Appearance
# See https://wiki.hypr.land/Configuring/Variables

# Colors
$accent = rgb(89b4fa)
$accent_alt = rgb(f5c2e7)
$bg = rgba(1e1e2ee6)
$fg = rgb(cdd6f4)

# General options
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = $accent $accent_alt 45deg
    col.inactive_border = rgba(45475aaa)
    resize_on_border = false
    layout = dwindle
}

# Decorations
decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = rgba(1e1e2e88)
    }

    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
        ignore_opacity = false
        xray = false
    }
}

# Animations
animations {
    enabled = yes
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 0, 0, 1, 1

    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = fade, 1, 3, liner
    animation = workspaces, 1, 5, wind
    animation = border, 1, 6, wind
}

# Window management
dwindle {
    preserve_split = true
    smart_split = true
    smart_resizing = true
}

master {
    new_status = master
    mfact = 0.55
}

# Misc
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    disable_scale_notification = true
    focus_on_activate = true
    enable_swallow = true
    swallow_regex = ^(ghostty|kitty|alacritty|foot)$
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# Debug
debug {
    vfr = true
}

# Cursor
cursor {
    hide_on_key_press = true
    hide_on_touch = true
    warp_on_change_workspace = 1
}

# Binds
binds {
    hide_special_on_workspace_change = true
    allow_workspace_cycles = true
    workspace_back_and_forth = true
}
