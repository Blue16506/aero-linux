# Aero Linux - Starship prompt configuration

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$fill\
$shell\
$cmd_duration\
$line_break\
$character"""

# Disable unwanted modules
aws.disabled = true
azure.disabled = true
gcloud.disabled = true
gradle.disabled = true
hg_branch.disabled = true
package.disabled = true

# Character
[character]
success_symbol = "[➜](green)"
error_symbol = "[➜](red)"

# Username
[username]
show_always = false
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style)@"

# Hostname
[hostname]
ssh_only = true
style = "bold yellow"
format = "[$hostname](bold cyan):"

# Directory
[directory]
truncation_length = 3
truncate_to_repo = false
style = "bold cyan"
format = "[$path]($style)"

# Git
[git_branch]
style = "purple"
format = " [$symbol$branch]($style)"
symbol = " "

[git_status]
style = "red"
format = "[$all_status$ahead_behind]($style)"
conflicted = "🏳"
ahead = "⇡\${count}"
behind = "⇣\${count}"
diverged = "⇕⇡\${ahead_count}⇣\${behind_count}"

# Command duration
[cmd_duration]
min_time = 2000
format = " took [$duration]($style)"
style = "yellow"

# Shell indicator
[shell]
style = "cyan"
format = "[$indicator]($style)"
disabled = false
bash_indicator = ""
zsh_indicator = ""
fish_indicator = ""

# Fill
[fill]
symbol = " "
