# Aero Linux - Limine bootloader configuration
# This file is templated and customized during installation

timeout: 5

entry "Aero Linux"
    protocol: linux
    kernel_path: /boot/vmlinuz-linux
    cmdline: root=UUID=ROOT_UUID rw rootflags=subvol=@ quiet loglevel=3 rd.udev.log_level=3
    module_path: /boot/initramfs-linux.img

entry "Aero Linux (fallback)"
    protocol: linux
    kernel_path: /boot/vmlinuz-linux
    cmdline: root=UUID=ROOT_UUID rw rootflags=subvol=@ quiet loglevel=3 rd.udev.log_level=3
    module_path: /boot/initramfs-linux-fallback.img

entry "Aero Linux (terminal)"
    protocol: linux
    kernel_path: /boot/vmlinuz-linux
    cmdline: root=UUID=ROOT_UUID rw rootflags=subvol=@ systemd.unit=multi-user.target
    module_path: /boot/initramfs-linux.img

entry "Aero Linux (snapshots)"
    protocol: linux
    kernel_path: /boot/vmlinuz-linux
    cmdline: root=UUID=ROOT_UUID rw rootflags=subvol=@/.snapshots/X/snapshot quiet loglevel=3
    module_path: /boot/initramfs-linux.img

entry "UEFI Shell"
    protocol: efi
    path: Shell.efi

entry "Reboot"
    protocol: reboot

entry "Power Off"
    protocol: poweroff